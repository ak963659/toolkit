<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Hash</title>
</head>
<body>

<h1>Live Hash</h1>
<p id="toastMessage"></p>

<label>Algorithm:</label>
<select id="hashAlgorithm">
  <option value="SHA-1">SHA-1</option>
  <option value="SHA-256" selected>SHA-256</option>
  <option value="SHA-384">SHA-384</option>
  <option value="SHA-512">SHA-512</option>
</select>

<br><br>

<label>Hash rounds:</label>
<input id="hashRounds" type="number" min="1" max="1000000000" step="1" value="1">

<br><br>

<textarea id="input" placeholder="Input here..."></textarea>

<br><br>

<textarea id="output" placeholder="Output here..." readonly></textarea>

<br><br>

<button id="copyButton">Copy</button>

<script>
const toastMessage = document.getElementById("toastMessage");
const hashAlgorithmDropdown = document.getElementById("hashAlgorithm");
const hashRoundsInput = document.getElementById("hashRounds");
const inputBox = document.getElementById("input");
const outputBox = document.getElementById("output");
const copyButton = document.getElementById("copyButton");

function showToast(message, duration = 1000) {
  toastMessage.textContent = message;
  setTimeout(() => {
    if (toastMessage.textContent === message) {
      toastMessage.textContent = "";
    }
  }, duration);
}

async function generateHash(input, algorithm) {
  const encoder = new TextEncoder();
  const data = encoder.encode(input);
  const hashBuffer = await crypto.subtle.digest(algorithm, data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(byte => byte.toString(16).padStart(2, "0")).join("");
}

async function generateHashWithRounds(input, algorithm, rounds) {
  let result = input;
  for (let i = 0; i < rounds; i++) {
    result = await generateHash(result, algorithm);
  }
  return result;
}

async function updateHash() {
  const inputText = inputBox.value;
  const algorithm = hashAlgorithmDropdown.value;
  const rounds = Number.parseInt(hashRoundsInput.value, 10);

  if (!Number.isInteger(rounds) || rounds < 1 || rounds > 1000000000) {
    outputBox.value = "";
    showToast("Hash rounds must be between 1 and 1,000,000,000.", 1500);
    return;
  }

  const hash = await generateHashWithRounds(inputText, algorithm, rounds);
  outputBox.value = hash;
}

inputBox.addEventListener("input", updateHash);
hashAlgorithmDropdown.addEventListener("change", updateHash);
hashRoundsInput.addEventListener("input", updateHash);

copyButton.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(outputBox.value);
    showToast("Hash copied to clipboard!");
  } catch (error) {
    outputBox.select();
    document.execCommand("copy");
    showToast("Hash copied to clipboard!");
  }
});

updateHash();
</script>

</body>
</html>
