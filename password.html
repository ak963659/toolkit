<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toolkit - Password Generator</title>
  </head>
  <body>
    <div>
      <h1>Password Generator</h1>
      <p id="toastMessage"></p>
      <textarea id="password" readonly></textarea>

      <br />

      <button id="copyButton">Copy</button>
      <button id="refreshButton">Refresh</button>

      <br />
      <br />

      <label for="lengthSlider">Length: <span id="lengthLabel">10</span></label>

      <br />
      <br />

      <input type="range" id="lengthSlider" min="1" max="50" value="10" />

      <br />
      <br />

      <select id="preDefinedLength">
        <option value="8">8</option>
        <option value="10" selected>10</option>
        <option value="12">12</option>
        <option value="15">15</option>
        <option value="20">20</option>
      </select>

      <br />
      <br />

      <input type="checkbox" id="uppercase" checked />
      <label for="uppercase">Uppercase</label>

      <br />

      <input type="checkbox" id="lowercase" checked />
      <label for="lowercase">Lowercase</label>

      <br />

      <input type="checkbox" id="numbers" checked />
      <label for="numbers">Numbers</label>

      <br />

      <input type="checkbox" id="symbols" checked />
      <label for="symbols">Symbols</label>
    </div>

    <script>
      /* ========== Constants ========== */

      const toastMessage = document.getElementById("toastMessage");
      const passwordElement = document.getElementById("password");
      const copyButton = document.getElementById("copyButton");
      const refreshButton = document.getElementById("refreshButton");
      const lengthSlider = document.getElementById("lengthSlider");
      const lengthLabel = document.getElementById("lengthLabel");
      const uppercaseCheckbox = document.getElementById("uppercase");
      const lowercaseCheckbox = document.getElementById("lowercase");
      const numbersCheckbox = document.getElementById("numbers");
      const symbolsCheckbox = document.getElementById("symbols");
      const presetSelect = document.getElementById("preDefinedLength");

      const uppercaseLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; // prettier-ignore
      const lowercaseLetters = 'abcdefghijklmnopqrstuvwxyz'; // prettier-ignore
      const numbers = '0123456789'; // prettier-ignore
      const symbols = '!"#$%&\'()*+,-./:;<=>?@[\\]^_`{|}~'; // prettier-ignore

      /* ========== Functions ========== */

      function showToast(message, duration = 1000) {
        toastMessage.textContent = message;

        setTimeout(() => {
          toastMessage.textContent = "";
        }, duration);
      }

      function generatePassword() {
        let selectedCharacters = "";
        if (uppercaseCheckbox.checked) selectedCharacters += uppercaseLetters;
        if (lowercaseCheckbox.checked) selectedCharacters += lowercaseLetters;
        if (numbersCheckbox.checked) selectedCharacters += numbers;
        if (symbolsCheckbox.checked) selectedCharacters += symbols;

        if (!selectedCharacters) {
          return "";
        }

        scrambledCharacters = selectedCharacters
          .split("")
          .sort(() => Math.random() - 0.5)
          .join("");

        let generatedPassword = "";
        const length = parseInt(lengthSlider.value);
        for (let i = 0; i < length; i++) {
          const randomIndex = Math.floor(
            Math.random() * scrambledCharacters.length
          );
          generatedPassword += scrambledCharacters[randomIndex];
        }
        return generatedPassword;
      }

      // Function to update the password display
      function updatePassword() {
        passwordElement.value = generatePassword();
      }

      /* ========== Event Handlers ========== */

      // Update the password length label when the slider changes
      lengthSlider.addEventListener("input", () => {
        lengthLabel.textContent = lengthSlider.value;
        presetSelect.value = lengthSlider.value;
        updatePassword();
      });

      // When dropdown is changed
      presetSelect.addEventListener("change", () => {
        lengthSlider.value = presetSelect.value;
        lengthLabel.textContent = lengthSlider.value;
        updatePassword();
      });

      // Generate a new password when the refresh button is clicked
      refreshButton.addEventListener("click", updatePassword);

      // Copy the password to the clipboard
      copyButton.addEventListener("click", () => {
        passwordElement.select();
        document.execCommand("copy");
        showToast("Password copied to clipboard!");
      });

      // Generate a password when any checkbox is toggled
      uppercaseCheckbox.addEventListener("change", updatePassword);
      lowercaseCheckbox.addEventListener("change", updatePassword);
      numbersCheckbox.addEventListener("change", updatePassword);
      symbolsCheckbox.addEventListener("change", updatePassword);

      /* ========== Initialization ========== */

      // Generate the initial password
      updatePassword();
    </script>
  </body>
</html>
